<!DOCTYPE html>
<html>
<head>
    <title>WealthChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🌌 BACKGROUND SLIDER -->
<div class="bg-slider">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="active">
    <img src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3">
    <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
</div>

<div class="chat-container">

    <!-- 🔥 PREMIUM HEADER -->
    <div class="header">
        💬 WealthChat  
        <div class="sub">Real-time chat 🚀</div>
    </div>

    <div id="chat" class="chat-box"></div>

    <!-- 😀 EMOJI BUTTON -->
    <div class="emoji-bar">
        <button onclick="toggleEmoji()">😊</button>
    </div>

    <!-- 😀 EMOJI PICKER -->
    <div id="emoji-picker" class="emoji-picker hidden">
        <div id="emoji-list"></div>
    </div>

    <!-- 📩 INPUT -->
    <div class="input-box">
        <input id="msg" placeholder="Type message..." autocomplete="off">
        <button onclick="send()">Send</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
